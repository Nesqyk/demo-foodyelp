<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demo FooD Yelp - Demo Video</title>
    <style>
      :root {
        --black: #000000;
        --light-gray: #f5f5f7;
        --near-black: #1d1d1f;
        --apple-blue: #0071e3;
        --white: #ffffff;
        --body-text: rgba(0, 0, 0, 0.8);
        --tertiary-text: rgba(0, 0, 0, 0.48);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
        background: var(--light-gray);
        color: var(--near-black);
      }

      .hero {
        padding: 72px 24px 40px;
        background: var(--black);
        color: var(--white);
        text-align: center;
      }

      .hero h1 {
        margin: 0;
        font-family: "SF Pro Display", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: clamp(32px, 6vw, 56px);
        font-weight: 600;
        line-height: 1.07;
        letter-spacing: -0.28px;
      }

      .hero p {
        max-width: 720px;
        margin: 16px auto 0;
        font-size: 17px;
        line-height: 1.47;
        letter-spacing: -0.374px;
        color: rgba(255, 255, 255, 0.85);
      }

      .content {
        width: min(1100px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0 64px;
      }

      .frame {
        position: relative;
        padding-bottom: 56.25%;
        height: 0;
        overflow: hidden;
        border-radius: 12px;
        background: var(--white);
        box-shadow: rgba(0, 0, 0, 0.22) 3px 5px 30px 0;
      }

      .frame iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        margin-top: 24px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 8px 18px;
        border-radius: 999px;
        font-size: 17px;
        line-height: 1;
        text-decoration: none;
      }

      .button-primary {
        background: var(--apple-blue);
        color: var(--white);
      }

      .button-secondary {
        border: 1px solid var(--apple-blue);
        color: var(--apple-blue);
        background: transparent;
      }

      .note {
        margin-top: 18px;
        text-align: center;
        color: var(--tertiary-text);
        font-size: 14px;
        line-height: 1.43;
        letter-spacing: -0.224px;
      }

      @media (max-width: 720px) {
        .hero {
          padding: 56px 16px 32px;
        }

        .content {
          width: min(100% - 16px, 1100px);
          padding: 24px 0 48px;
        }

        .actions {
          flex-direction: column;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <section class="hero">
      <h1>Demo FooD Yelp</h1>
      <p>Playable product demo for the Yelp restaurant search app.</p>
    </section>

    <main class="content">
      <div class="frame">
        <iframe
          id="js_video_iframe"
          src="https://jumpshare.com/embed/Bhljged2OsePdrCcmDE0"
          allowfullscreen
          webkitallowfullscreen
          mozallowfullscreen
          title="Demo FooD Yelp demo video"
        ></iframe>
      </div>

      <div class="actions">
        <a class="button button-primary" href="https://jumpshare.com/embed/Bhljged2OsePdrCcmDE0">Open demo</a>
        <a class="button button-secondary" href="https://github.com/Nesqyk/demo-foodyelp">Back to repo</a>
      </div>

      <p class="note">If the embedded player does not load, use the Open demo button.</p>
    </main>
  </body>
  </html>
